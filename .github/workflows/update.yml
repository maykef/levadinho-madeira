name: Update trail status

on:
  schedule:
    - cron: "40 6 * * *"   # 06:40 UTC = 07:40 in Madeira, before sunrise hikers check
  workflow_dispatch: {}     # lets you run it manually from the GitHub app anytime

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pypdf

      - name: Update status from IFCN / Visit Madeira + Open-Meteo
        run: python scripts/update_status.py

      - name: Commit and push if changed
        run: |
          git config user.name "levadinho-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html getting-back.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Daily status update $(date -u +%F)"
          git push
